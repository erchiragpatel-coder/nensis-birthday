<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Nensi ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: 'Poppins', sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* Intro screen */
#intro {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  background:black;
  animation: fadeOut 4s forwards 3s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* Main container */
#main {
  display:none;
  text-align:center;
  padding-top:80px;
}

/* Gift box */
.gift {
  font-size:80px;
  cursor:pointer;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* Message */
#message {
  margin-top:20px;
  font-size:20px;
  opacity:0;
  transition:1s;
}

/* Hearts */
.heart {
  position:absolute;
  font-size:20px;
  animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
  0% {transform:translateY(0); opacity:1;}
  100% {transform:translateY(-600px); opacity:0;}
}

/* Footer */
.footer {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <h1>Something special for you ❤️</h1>
</div>

<!-- Main -->
<div id="main">
  <h1>🎂 Happy Birthday Nensi ❤️</h1>

  <div class="gift" onclick="openGift()">🎁</div>
  <p>Tap the gift 🎁</p>

  <div id="message">
    <p id="typing"></p>

    <img src="https://i.imgur.com/4AiXzf8.jpeg" width="200" style="border-radius:15px; margin-top:15px;">

    <p>
      You are still my favorite person ❤️<br>
      I miss you more than words 💔
    </p>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  ✨ Developed with ❤️ by <b>CHIRAG PATEL</b>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

// show main after intro
setTimeout(()=>{
  document.getElementById("main").style.display="block";
},4000);

// typing effect
let text = "I don't know if you will ever come back... but I still wait ❤️";
let i=0;

function typeEffect(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect,40);
  }
}

// open gift
function openGift(){
  document.getElementById("message").style.opacity=1;
  document.getElementById("music").play();
  typeEffect();
  blastHearts();
}

// hearts explosion
function blastHearts(){
  for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="80%";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
  }
}

</script>

</body>
</html>
