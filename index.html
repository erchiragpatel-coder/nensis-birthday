<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Nensi</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 400px;
  animation: fadeIn 2s ease;
}

h1 {
  font-weight: 300;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

button {
  padding: 10px 20px;
  background: transparent;
  border: 1px solid #888;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #fff;
  color: #000;
}

#message {
  margin-top: 30px;
  opacity: 0;
  transition: 1.5s;
}

img {
  width: 180px;
  border-radius: 10px;
  margin-top: 20px;
  filter: grayscale(20%);
}

.footer {
  position: fixed;
  bottom: 15px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #777;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Happy Birthday</h1>
  <p>Nensi</p>

  <button onclick="reveal()">Open</button>

  <div id="message">
    <p id="typing"></p>

    <img src="https://i.imgur.com/4AiXzf8.jpeg">

    <p style="margin-top:15px; color:#aaa;">
      Some feelings never change.<br>
      Even if everything else did.
    </p>
  </div>
</div>

<div class="footer">
  Developed by CHIRAG PATEL
</div>

<audio id="music">
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<script>
let text = "I didn’t build this to impress you... I built it because I still care.";
let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}

function reveal() {
  document.getElementById("message").style.opacity = 1;
  document.getElementById("music").play();
  typeText();
}
</script>

</body>
</html>
