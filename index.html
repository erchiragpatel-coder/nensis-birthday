<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Nensi</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0a0a0a;
  color:#eaeaea;
  overflow:hidden;
}

/* Intro blur screen */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  letter-spacing:2px;
  background:#000;
  animation: fadeOut 3s ease forwards 2s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* Main content */
.container {
  opacity:0;
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation: fadeIn 2s ease forwards 3s;
}

@keyframes fadeIn {
  from {opacity:0; transform:translate(-50%,-40%);}
  to {opacity:1; transform:translate(-50%,-50%);}
}

h1 {
  font-weight:300;
  letter-spacing:3px;
}

button {
  margin-top:20px;
  padding:10px 25px;
  border:1px solid #888;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:0.4s;
}

button:hover {
  background:white;
  color:black;
}

/* message */
#msg {
  margin-top:25px;
  opacity:0;
  transition:1.5s;
}

img {
  width:180px;
  border-radius:12px;
  margin-top:20px;
  filter: brightness(0.9);
}

/* footer */
.footer {
  position:fixed;
  bottom:15px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#777;
}

</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <p>Just wait a second…</p>
</div>

<!-- Main -->
<div class="container">
  <h1>Happy Birthday</h1>
  <p>Nensi</p>

  <button onclick="openMsg()">Open</button>

  <div id="msg">
    <p id="typing"></p>

    <img src="https://i.imgur.com/4AiXzf8.jpeg">

    <p style="margin-top:15px; color:#aaa;">
      Not everything needs to be loud.<br>
      Some things are just... real.
    </p>
  </div>
</div>

<div class="footer">
  Developed by CHIRAG PATEL
</div>

<audio id="music">
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<script>
let text = "I didn’t forget you. I just learned to stay quiet about it.";
let i = 0;

function typeText(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 45);
  }
}

function openMsg(){
  document.getElementById("msg").style.opacity = 1;
  document.getElementById("music").play();
  typeText();
}
</script>

</body>
</html>
