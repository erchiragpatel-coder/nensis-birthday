<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* canvas stars */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* intro */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  background:#000;
  animation:fadeOut 3s forwards 2s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* main */
.container {
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  animation:fadeIn 2s forwards 3s;
}

@keyframes fadeIn {
  to {opacity:1;}
}

h1 {
  font-size:46px;
  letter-spacing:3px;
}

.name {
  font-size:24px;
  color:#aaa;
}

button {
  margin-top:20px;
  padding:14px 35px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  cursor:pointer;
}

/* message */
#msg {
  margin-top:25px;
  opacity:0;
  transition:1.5s;
}

#typing {
  font-size:20px;
  line-height:1.7;
}

/* photo */
.photo {
  width:260px;
  margin-top:20px;
  border-radius:15px;
  animation:zoom 6s infinite alternate;
}

@keyframes zoom {
  from {transform:scale(1);}
  to {transform:scale(1.1);}
}

/* BIG NAME */
.big-name {
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size:40px;
  font-weight:800;
  letter-spacing:3px;
  background: linear-gradient(45deg,#fff,#ff4d6d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">
  <p>I made something for you…</p>
</div>

<div class="container">
  <h1>Happy Birthday</h1>
  <p class="name">Nensi❤️🎂🥳</p>

  <button onclick="openMsg()">Open</button>

  <div id="msg">
    <p id="typing"></p>
    <img src="1775059651529.png" class="photo">
  </div>
</div>

<div class="big-name">CHIRAG PATEL</div>

<audio id="music" loop>
  <source src="nensichirag.mp3" type="audio/mp3">
</audio>

<script>
// typing
let text="Some people stay… even when they are not around anymore.";
let i=0;

function typeText(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeText,40);
  }
}

function openMsg(){
  document.getElementById("msg").style.opacity=1;
  document.getElementById("music").play();
  typeText();
}

// stars animation
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  stars.forEach(star=>{
    ctx.beginPath();
    ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
    ctx.fill();

    star.y += star.speed;
    if(star.y > canvas.height){
      star.y = 0;
      star.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
