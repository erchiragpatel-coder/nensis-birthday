<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#0b0b0b;
  color:#f1f1f1;
  overflow:hidden;
}

/* Intro */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  letter-spacing:2px;
  background:#000;
  animation: fadeOut 3s ease forwards 2s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* Main */
.container {
  opacity:0;
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation: fadeIn 2s ease forwards 3s;
}

@keyframes fadeIn {
  from {opacity:0; transform:translate(-50%,-40%);}
  to {opacity:1; transform:translate(-50%,-50%);}
}

h1 {
  font-size:44px;
  font-weight:300;
  letter-spacing:3px;
}

.name {
  font-size:24px;
  color:#aaa;
}

/* Button */
button {
  margin-top:25px;
  padding:14px 35px;
  border:1px solid #777;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:19px;
  transition:0.4s;
}

button:hover {
  background:white;
  color:black;
}

/* Message */
#msg {
  margin-top:30px;
  opacity:0;
  transition:1.5s;
}

#typing {
  font-size:21px;
  line-height:1.7;
}

/* Slideshow */
.slideshow img {
  width:230px;
  border-radius:15px;
  margin-top:20px;
  display:none;
  animation: fadeImg 1s;
}

@keyframes fadeImg {
  from {opacity:0;}
  to {opacity:1;}
}

/* Note */
.note {
  margin-top:15px;
  color:#bbb;
  font-size:16px;
}

/* BIG FOOTER */
.footer {
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
}

/* SUPER BIG NAME */
.big-name {
  font-size:38px;
  font-weight:800;
  letter-spacing:3px;
  background: linear-gradient(45deg, #ffffff, #ff4d6d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(255,255,255,0.5);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px rgba(255,255,255,0.3);}
  to {text-shadow:0 0 30px rgba(255,255,255,0.8);}
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <p>Just something I made for you…</p>
</div>

<!-- Main -->
<div class="container">
  <h1>Happy Birthday</h1>
  <p class="name">Nensi ❤️🎉</p>

  <button onclick="openMsg()">Open</button>

  <div id="msg">
    <p id="typing"></p>

    <!-- Slideshow -->
    <div class="slideshow">
      <img src="1775059651529.png" class="slide">
      <img src="1775059651529.png" class="slide">
      <img src="1775059651529.png" class="slide">
    </div>

    <p class="note">
      Some people never really leave your heart…<br>
      no matter what happens.
    </p>
  </div>
</div>

<!-- BIG NAME -->
<div class="footer">
  <div class="big-name">CHIRAG PATEL</div>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="nensichirag.mp3" type="audio/mp3">
</audio>

<script>
let text = "I didn’t make this to remind you… I made it because you were never gone.";
let i = 0;

function typeText(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}

function openMsg(){
  document.getElementById("msg").style.opacity = 1;
  document.getElementById("music").play();
  typeText();
  startSlideshow();
}

// slideshow
let index = 0;
function startSlideshow(){
  let slides = document.getElementsByClassName("slide");
  setInterval(()=>{
    for(let i=0;i<slides.length;i++){
      slides[i].style.display="none";
    }
    slides[index].style.display="block";
    index = (index+1) % slides.length;
  },2000);
}
</script>

</body>
</html>
