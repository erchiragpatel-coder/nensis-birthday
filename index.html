<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#0b0b0b;
  color:#f1f1f1;
  overflow:hidden;
}

/* Intro */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  letter-spacing:2px;
  background:#000;
  animation: fadeOut 3s ease forwards 2s;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}

/* Container */
.container {
  opacity:0;
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation: fadeIn 2s ease forwards 3s;
}

@keyframes fadeIn {
  from {opacity:0; transform:translate(-50%,-40%);}
  to {opacity:1; transform:translate(-50%,-50%);}
}

h1 {
  font-size:42px;
  font-weight:300;
  letter-spacing:3px;
}

.name {
  font-size:22px;
  color:#aaa;
}

/* Button */
button {
  margin-top:25px;
  padding:12px 30px;
  border:1px solid #777;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:18px;
  transition:0.4s;
}

button:hover {
  background:white;
  color:black;
}

/* Message */
#msg {
  margin-top:30px;
  opacity:0;
  transition:1.5s;
}

#typing {
  font-size:20px;
  line-height:1.7;
}

img {
  width:220px;
  border-radius:12px;
  margin-top:20px;
  filter: brightness(0.9);
}

.note {
  margin-top:15px;
  color:#bbb;
  font-size:16px;
}

/* Footer */
.footer {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:18px;
  color:#aaa;
  letter-spacing:2px;
}

/* Highlight Name */
.name-highlight {
  font-size:26px;
  font-weight:700;
  background: linear-gradient(45deg, #ffffff, #ff4d6d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 15px rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <p>Just something I wanted you to see…</p>
</div>

<!-- Main -->
<div class="container">
  <h1>Happy Birthday</h1>
  <p class="name">Nensi</p>

  <button onclick="openMsg()">Open</button>

  <div id="msg">
    <p id="typing"></p>

    <!-- YOUR PHOTO -->
    <img src="1775059651529.png">

    <p class="note">
      Some people never really leave your heart…<br>
      no matter what happens.
    </p>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  ✨ Developed by <span class="name-highlight">CHIRAG PATEL</span>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="nensichirag.mp3" type="audio/mp3">
</audio>

<script>
let text = "I didn’t make this to remind you of me… I made it because I couldn’t forget you.";
let i = 0;

function typeText(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 45);
  }
}

function openMsg(){
  document.getElementById("msg").style.opacity = 1;
  document.getElementById("music").play();
  typeText();
}
</script>

</body>
</html>
